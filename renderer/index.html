<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; media-src 'self' file: blob:; img-src 'self' data: file:; style-src 'self' 'unsafe-inline';" />
  <title>Rei</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Custom title bar -->
  <div class="titlebar">
    <span class="titlebar-title">Rei</span>
    <div class="titlebar-controls">
      <button class="tb-btn" id="btn-minimize">&#8722;</button>
      <button class="tb-btn" id="btn-maximize">&#9633;</button>
      <button class="tb-btn close" id="btn-close">&#10005;</button>
    </div>
  </div>

  <div class="app">
    <!-- Sidebar / Playlist -->
    <aside class="sidebar">
      <div class="sidebar-actions">
        <button class="action-btn" id="btn-add-files">+ Files</button>
        <button class="action-btn" id="btn-add-folder">+ Folder</button>
        <button class="action-btn danger" id="btn-clear">Clear</button>
      </div>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search..." autocomplete="off" />
      </div>
      <ul class="playlist" id="playlist"></ul>
    </aside>

    <!-- Main panel -->
    <main class="main-panel">
      <!-- Album art + info -->
      <div class="now-playing">
        <div class="album-art-wrap">
          <img class="album-art" id="album-art" src="" alt="" />
          <div class="album-art-placeholder" id="art-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="3"/>
              <line x1="12" y1="2" x2="12" y2="9"/>
            </svg>
          </div>
        </div>
        <div class="track-info">
          <div class="track-title" id="track-title">No track loaded</div>
          <div class="track-artist" id="track-artist">—</div>
          <div class="track-meta" id="track-meta"></div>
        </div>
      </div>

      <!-- Seek bar -->
      <div class="seek-row">
        <span class="time" id="time-current">0:00</span>
        <input type="range" class="seek-bar" id="seek-bar" min="0" max="1000" value="0" />
        <span class="time" id="time-total">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn" id="btn-prev" title="Previous">
          <svg viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btn-play" title="Play / Pause">
          <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="Next">
          <svg viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
        <button class="ctrl-btn repeat-btn" id="btn-repeat" data-mode="none" title="Repeat: Off">
          <!-- repeat-all icon -->
          <svg class="icon-repeat-all" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          <!-- repeat-one icon -->
          <svg class="icon-repeat-one" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><text x="10" y="14" font-size="7" fill="currentColor" stroke="none" font-weight="bold" font-family="sans-serif">1</text></svg>
        </button>
        <div class="volume-wrap">
          <svg class="vol-icon" viewBox="0 0 24 24"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54,8.46a5,5,0,0,1,0,7.07"/><path d="M19.07,4.93a10,10,0,0,1,0,14.14"/></svg>
          <input type="range" class="volume-bar" id="volume-bar" min="0" max="100" value="80" />
        </div>
      </div>
    </main>
  </div>

  <!-- Hidden audio element -->
  <audio id="audio"></audio>

  <script src="renderer.js"></script>
</body>
</html>
